<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <section class="slideshow">
        <div class="list-images">
            <div class="item-image">
                <img src="img/sp1.jpg" alt="SP1">
            </div>
            <div class="item-image">
                <img src="img/sp2.jpg" alt="SP2">
            </div>
            <div class="item-image">
                <img src="img/sp3.jpg" alt="SP3">
            </div>
            <div class="item-image">
                <img src="img/sp4.jpg" alt="SP4">
            </div>
            <div class="item-image">
                <img src="img/sp5.jpg" alt="SP5">
            </div>
        </div>
    </section>
    <hr>
    <div class="control-button">
            <button onclick="slideFirst()">Đầu tiên</button>
            <button onclick="slidePre()">Trước đó</button>
            <button onclick="slideAuto()">Tự động phát</button>
            <button onclick="slideStop()">Dừng lại</button>
            <button onclick="slideNext()">Tiếp theo</button>
            <button onclick="slideLast()">Cuối cùng</button>
            <button onclick="slideResetStart()">Cài lại</button>
        </div>
  </div>

    <script src="js/script.js"></script>
</body>
</html>
