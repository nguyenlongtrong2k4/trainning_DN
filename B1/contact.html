<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Works</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="#">About Us</a></li>
                </ul>
            </nav>
        </header>
        <section class="main">
            <div class="mail_to">
                <h1>Contact Us</h1>
                <p>If you have any questions, please feel free to contact us.</p>
                <ul>
                    <li>Email:
                        <a href="mailto:nguyenlongtrong2k4a6@gmail.com">nguyenlongtrong2k4a6@gmail.com</a>
                    </li>
                    <li>Phone: +84867679704</li>
                    <li>Address: 53 Phan Dinh Phung ,Thai Nguyen City, Vietnam</li>
                </ul>
            </div>
          <div class="contact-form">
            <form action="#">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>

                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone" required><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" cols="30" required></textarea><br><br>

                <input type="submit" value="Submit">
            </form>
          </div>
        </section>
        <br>
    </div>
    <script>
        const form = document.querySelector('.contact-form form');
        form.addEventListener('submit', function(event) {
            event.preventDefault(); 
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;
            alert('Đã gửi thành công!' + '\nName: ' + name + '\nEmail: ' + email + '\nPhone: ' + phone + '\nMessage: ' + message);
            form.reset();
        });
    </script>
</body>
</html>
